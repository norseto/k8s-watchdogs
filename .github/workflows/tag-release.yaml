name: 'Tag Release'

on:
  push:
    branches:
      - main
      - 'release-*'
    paths:
      - version.go

jobs:
  tag-release:
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write

    steps:
      - uses: actions/checkout@v4
      - run: /usr/bin/git config --global user.email actions@github.com
      - run: /usr/bin/git config --global user.name 'GitHub Actions Release Tagger'
      - run: hack/tag-release.sh
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: image-meta
        run: |
          echo "tag=v$(hack/get-version.sh)" >> "$GITHUB_OUTPUT"
          echo "gitversion=$(git describe --always)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: norseto/k8s-watchdogs:${{ steps.image-meta.outputs.tag }}
          build-args: |
            MODULE_PACKAGE=github.com/norseto/k8s-watchdogs
            GITVERSION=${{ steps.image-meta.outputs.gitversion }}
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: index.docker.io/norseto/k8s-watchdogs
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
